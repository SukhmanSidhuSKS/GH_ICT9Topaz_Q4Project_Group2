<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<link rel="stylesheet" href="style.css">
<style>
    .login-box {
    max-width: 600px;
    margin: auto;
    background: #DDCAD9;
    border-radius: 20px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

.logo {
  display: block;
  margin-left: auto;
  margin-right: auto;
  width: 60%; 
} 
</style>
</head>
<body>
<br>
    <div class="container mt-5">
        <form class="box-bg">
            <div class="login-box p-4"> <!-- Used Google -->
            
                <h1 style="text-align: center;">Login</h1>
               
                <div class="login-card">
                 <img src="website logo.png" class="logo" alt="Logo">
                </div>

                <div class="row mb-3">
                    <div class="col">
                        <h4>Username</h4>
                            <input type="text" id="username" class="form-control" placeholder="Enter here"><br> 
                             <br>
                        <h4>Password</h4>
                            <input type="password" id="password" class="form-control" placeholder="********"><br> 
                             <label class="switch">
                <input type="checkbox" checked>
                <span class="slider"></span>
                </label>
                <span>Stay logged in</span> <!-- Used Google -->
                <br>
                <br>     
           <button type="button" id="btn" class="btn btn-primary" onclick="password()">Login</button>
                    <button type="reset" class="btn btn-light">Cancel</button>
                </div>
            </div>  
        <a href="https://accounts.google.com/signin/recovery" title="Reset your Gmail password">Forgot username / password?</a> <!-- Used Google -->
            </div> 
        </form>
    </div>

    <div id="display"></div>
    <script src="main.js"></script>
